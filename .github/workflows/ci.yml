name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - run: bun run build:native
      - run: bun run format -- --check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run e2e:install
      - run: bun run e2e
